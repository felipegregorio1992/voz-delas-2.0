name: vozdelas
description: Aplicativo Voz Delas - Sistema de proteção e denúncia
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # HTTP
  dio: ^5.4.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Navigation
  go_router: ^13.0.0

  # Geolocation
  geolocator: ^10.1.0
  permission_handler: ^11.1.0

  # UI
  cupertino_icons: ^1.0.6
  intl: ^0.20.2

  # Utils
  uuid: ^4.2.1
  url_launcher: ^6.2.2
  
  # WebSocket
  socket_io_client: ^2.0.3+1
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  
  # Google Sign-In
  google_sign_in: ^6.2.1

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  
  # WebRTC
  flutter_webrtc: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

